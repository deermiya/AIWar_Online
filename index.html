<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEER杯 AI 狼人杀 - CYBERPUNK HUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --c-cyan: #00f0ff;
      --c-red: #ff003c;
      --c-yellow: #fcee0a;
      --c-bg: #030407;
      --c-panel: rgba(5, 8, 12, 0.85);
      --c-text: #d1d5db;
    }

    body {
      background-color: var(--c-bg);
      color: var(--c-text);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    /* Cyberpunk Animated Background */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 20% 50%, rgba(0, 240, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 0, 60, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(252, 238, 10, 0.05) 0%, transparent 50%);
      animation: bgPulse 8s ease-in-out infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes bgPulse {
      0%, 100% {
        opacity: 0.6;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    /* CRT Scanlines Overlay */
    body::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background:
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 999;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      animation: scanline 8s linear infinite;
    }

    @keyframes scanline {
      0% {
        background-position: 0 0, 0 0;
      }
      100% {
        background-position: 0 100%, 0 0;
      }
    }

    /* UI Layout Container */
    .app-container {
      display: grid;
      grid-template-rows: 70px 1fr 70px;
      height: 100vh;
      padding: 15px 25px;
      gap: 15px;
      position: relative;
      z-index: 10;
    }

    /* HEADER */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--c-cyan);
      position: relative;
      background: linear-gradient(90deg, rgba(0, 240, 255, 0.15) 0%, transparent 40%);
    }

    .app-header::before {
      content: "";
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 20%;
      height: 2px;
      background: var(--c-yellow);
      box-shadow: 0 0 10px var(--c-yellow);
    }

    .app-header::after {
      content: "SYSTEM_ONLINE // V 2.4.9";
      position: absolute;
      bottom: -18px;
      right: 0;
      color: var(--c-cyan);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      opacity: 0.7;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      text-transform: uppercase;
      font-size: 26px;
      text-shadow: 0 0 8px var(--c-cyan), 2px 2px 0px rgba(255, 0, 60, 0.5);
      letter-spacing: 3px;
      margin-left: 15px;
    }

    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      color: var(--c-yellow);
      border: 1px solid var(--c-yellow);
      padding: 4px 16px;
      background: rgba(252, 238, 10, 0.1);
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
      letter-spacing: 1px;
      font-size: 13px;
      text-shadow: 0 0 5px var(--c-yellow);
    }

    /* MAIN GRID */
    .app-main-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      height: 100%;
      min-height: 0;
    }

    /* PANELS */
    .cy-panel {
      background: var(--c-panel);
      border: 1px solid rgba(0, 240, 255, 0.2);
      position: relative;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      box-shadow:
        0 0 30px rgba(0, 240, 255, 0.1),
        inset 0 0 50px rgba(0, 0, 0, 0.5);
    }

    .cy-panel::before {
      content: "";
      position: absolute;
      top: -1px;
      left: -1px;
      width: 30px;
      height: 3px;
      background: var(--c-cyan);
      box-shadow: 0 0 10px var(--c-cyan);
      animation: cornerPulse 2s ease-in-out infinite;
    }

    .cy-panel::after {
      content: "";
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 30px;
      height: 3px;
      background: var(--c-cyan);
      box-shadow: 0 0 10px var(--c-cyan);
      animation: cornerPulse 2s ease-in-out infinite 1s;
    }

    @keyframes cornerPulse {
      0%, 100% {
        opacity: 0.8;
        box-shadow: 0 0 10px var(--c-cyan);
      }
      50% {
        opacity: 1;
        box-shadow: 0 0 20px var(--c-cyan);
      }
    }

    .panel-header {
      padding: 12px 18px;
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      font-size: 14px;
      letter-spacing: 2px;
      border-bottom: 1px solid rgba(0, 240, 255, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(90deg, rgba(0, 240, 255, 0.1) 0%, transparent 100%);
      position: relative;
      overflow: hidden;
    }

    .panel-header::before {
      content: "";
      position: absolute;
      left: -100%;
      top: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(0, 240, 255, 0.2),
        transparent
      );
      animation: headerSweep 3s linear infinite;
    }

    @keyframes headerSweep {
      0% {
        left: -100%;
      }
      100% {
        left: 100%;
      }
    }

    /* LEFT: PLAYERS LIST */
    .players-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pcard {
      position: relative;
      background: rgba(0, 0, 0, 0.7);
      border-left: 4px solid var(--p-color, var(--c-cyan));
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      cursor: default;
    }

    .pcard::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
      pointer-events: none;
      clip-path: inherit;
    }

    .pcard:hover,
    .pcard.speaking {
      background: rgba(var(--p-color-rgb, 0, 240, 255), 0.15);
      box-shadow:
        inset 0 0 25px rgba(var(--p-color-rgb, 0, 240, 255), 0.25),
        0 0 20px rgba(var(--p-color-rgb, 0, 240, 255), 0.4);
      transform: translateX(5px);
    }

    .pcard.dead {
      filter: grayscale(1) opacity(0.35);
      border-left-color: #333 !important;
    }

    .seat-num {
      position: absolute;
      top: 0;
      left: 0;
      background: var(--p-color, var(--c-cyan));
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 900;
      padding: 2px 8px;
      clip-path: polygon(0 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
    }

    .avatar-hex {
      width: 44px;
      height: 44px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: var(--p-color, var(--c-cyan));
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 6px;
    }

    .avatar-hex img {
      width: 40px;
      height: 40px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      object-fit: cover;
    }

    .pcard-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 6px;
    }

    .pcard .name {
      font-family: 'Orbitron', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }

    .pcard .role {
      align-self: flex-start;
      padding: 1px 6px;
      font-size: 11px;
      background: rgba(var(--role-color-rgb, 255, 255, 255), 0.1);
      border: 1px solid var(--role-color);
      color: var(--role-color);
      font-family: 'Share Tech Mono', monospace;
      text-shadow: 0 0 4px var(--role-color);
    }

    .skull-badge {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%) rotate(10deg);
      color: var(--c-red);
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 15px;
      text-shadow: 0 0 8px var(--c-red);
      border: 1px solid var(--c-red);
      background: rgba(255, 0, 60, 0.1);
      padding: 2px 10px;
      letter-spacing: 2px;
    }

    .mic-wave {
      display: none;
      position: absolute;
      right: 12px;
      bottom: 12px;
      gap: 3px;
    }

    .pcard.speaking .mic-wave {
      display: flex;
    }

    .mic-wave span {
      width: 3px;
      height: 10px;
      background: var(--p-color, var(--c-cyan));
      animation: cyWave 1s infinite ease-in-out;
    }

    .mic-wave span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .mic-wave span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes cyWave {

      0%,
      100% {
        height: 4px;
      }

      50% {
        height: 16px;
        box-shadow: 0 0 8px currentColor;
      }
    }

    /* RIGHT: CHAT BUBBLES */
    .chat-container {
      position: relative;
      overflow: hidden;
    }

    .chat-container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(to bottom, var(--c-panel), transparent);
      z-index: 2;
      pointer-events: none;
    }

    .chat-container::after {
      content: "// 01001000 01000101 01001100 01001100 01001111";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(0, 240, 255, 0.05);
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.2;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      animation: binaryFlow 20s linear infinite;
    }

    @keyframes binaryFlow {
      0% {
        transform: translateY(0);
        opacity: 0.05;
      }
      50% {
        opacity: 0.1;
      }
      100% {
        transform: translateY(20px);
        opacity: 0.05;
      }
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
    }

    .chat-bubble {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      animation: bubbleSlideIn 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
    }

    @keyframes bubbleSlideIn {
      0% {
        opacity: 0;
        transform: translateX(30px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .chat-bubble.system {
      justify-content: center;
      opacity: 0.7;
    }

    .chat-bubble.phase {
      justify-content: center;
    }

    .bubble-avatar {
      width: 48px;
      height: 48px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      border: 2px solid var(--player-color, var(--c-cyan));
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.5);
      box-shadow:
        0 0 15px var(--player-color, var(--c-cyan)),
        inset 0 0 10px var(--player-color, var(--c-cyan));
      position: relative;
      animation: avatarGlow 3s ease-in-out infinite;
    }

    @keyframes avatarGlow {
      0%, 100% {
        box-shadow:
          0 0 15px var(--player-color, var(--c-cyan)),
          inset 0 0 10px var(--player-color, var(--c-cyan));
      }
      50% {
        box-shadow:
          0 0 25px var(--player-color, var(--c-cyan)),
          inset 0 0 15px var(--player-color, var(--c-cyan));
      }
    }

    .bubble-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    .bubble-content {
      flex: 1;
      max-width: 75%;
    }

    .bubble-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .bubble-name {
      font-family: 'Orbitron', sans-serif;
      color: var(--player-color, var(--c-cyan));
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 0 8px var(--player-color, var(--c-cyan));
    }

    .bubble-role {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 2px 8px;
      background: rgba(var(--role-color-rgb, 255, 255, 255), 0.15);
      border: 1px solid var(--role-color, #fff);
      color: var(--role-color, #fff);
      clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
    }

    .bubble-text {
      background: rgba(0, 0, 0, 0.6);
      border-left: 3px solid var(--player-color, var(--c-cyan));
      padding: 12px 16px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.5;
      color: #fff;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
      box-shadow:
        0 0 20px rgba(var(--player-color-rgb, 0, 240, 255), 0.2),
        inset 0 0 30px rgba(0, 0, 0, 0.5);
      position: relative;
      backdrop-filter: blur(4px);
      overflow: hidden;
    }

    .bubble-text::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 10px;
      height: 10px;
      border-top: 1px solid var(--player-color, var(--c-cyan));
      border-right: 1px solid var(--player-color, var(--c-cyan));
      opacity: 0.5;
    }

    .bubble-text::after {
      content: "";
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(var(--player-color-rgb, 0, 240, 255), 0.1),
        transparent
      );
      animation: textScan 3s linear infinite;
      pointer-events: none;
    }

    @keyframes textScan {
      0% {
        top: -100%;
      }
      100% {
        top: 100%;
      }
    }

    .bubble-system {
      background: transparent;
      border: 1px dashed rgba(0, 240, 255, 0.3);
      border-left: 3px solid var(--c-cyan);
      padding: 10px 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--c-cyan);
      text-align: center;
      clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px), 0 8px);
      max-width: 80%;
      margin: 0 auto;
    }

    .bubble-phase {
      background: linear-gradient(90deg, transparent, rgba(252, 238, 10, 0.1), transparent);
      border-top: 1px solid var(--c-yellow);
      border-bottom: 1px solid var(--c-yellow);
      padding: 12px 24px;
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--c-yellow);
      text-align: center;
      letter-spacing: 3px;
      text-shadow: 0 0 10px var(--c-yellow);
      width: 100%;
      position: relative;
    }

    .bubble-phase::before,
    .bubble-phase::after {
      content: "//";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--c-yellow);
      opacity: 0.5;
      font-size: 12px;
    }

    .bubble-phase::before {
      left: 10px;
    }

    .bubble-phase::after {
      right: 10px;
    }

    .bubble-death {
      background: repeating-linear-gradient(
        45deg,
        rgba(255, 0, 60, 0.15),
        rgba(255, 0, 60, 0.15) 10px,
        rgba(255, 0, 60, 0.05) 10px,
        rgba(255, 0, 60, 0.05) 20px
      );
      border-left: 4px solid var(--c-red);
      padding: 12px 16px;
      font-family: 'Orbitron', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--c-red);
      text-shadow: 0 0 8px var(--c-red);
      max-width: 80%;
      margin: 0 auto;
      text-align: center;
    }

    .bubble-win {
      background: linear-gradient(135deg, rgba(252, 238, 10, 0.2), rgba(0, 240, 255, 0.2));
      border: 2px solid var(--c-yellow);
      padding: 20px 30px;
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 900;
      color: var(--c-yellow);
      text-align: center;
      letter-spacing: 4px;
      text-shadow: 0 0 15px var(--c-yellow);
      clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
      animation: pulseGlow 2s infinite;
    }

    @keyframes pulseGlow {
      0%, 100% {
        box-shadow: 0 0 20px rgba(252, 238, 10, 0.5);
      }
      50% {
        box-shadow: 0 0 40px rgba(252, 238, 10, 0.8);
      }
    }

    /* CYBERPUNK ENHANCEMENTS */
    @keyframes glitch {
      0% {
        text-shadow: 0.05em 0 0 rgba(255, 0, 60, 0.75),
                    -0.025em -0.05em 0 rgba(0, 240, 255, 0.75);
      }
      14% {
        text-shadow: 0.05em 0 0 rgba(255, 0, 60, 0.75),
                    -0.025em -0.05em 0 rgba(0, 240, 255, 0.75);
      }
      15% {
        text-shadow: -0.05em -0.025em 0 rgba(255, 0, 60, 0.75),
                    0.025em 0.025em 0 rgba(0, 240, 255, 0.75);
      }
      49% {
        text-shadow: -0.05em -0.025em 0 rgba(255, 0, 60, 0.75),
                    0.025em 0.025em 0 rgba(0, 240, 255, 0.75);
      }
      50% {
        text-shadow: 0.025em 0.05em 0 rgba(255, 0, 60, 0.75),
                    0.05em 0 0 rgba(0, 240, 255, 0.75);
      }
      99% {
        text-shadow: 0.025em 0.05em 0 rgba(255, 0, 60, 0.75),
                    0.05em 0 0 rgba(0, 240, 255, 0.75);
      }
      100% {
        text-shadow: -0.025em 0 0 rgba(255, 0, 60, 0.75),
                    -0.025em -0.025em 0 rgba(0, 240, 255, 0.75);
      }
    }

    h1 {
      animation: glitch 2s infinite;
    }

    .btn-retry {
      background: transparent;
      border: 1px solid #f97316;
      color: #f97316;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
      margin-top: 8px;
      display: inline-block;
      transition: all 0.2s;
    }

    .btn-retry:hover {
      background: #f97316;
      color: #000;
      box-shadow: 0 0 10px #f97316;
    }

    /* BOTTOM CONTROLS */
    .app-controls {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      border-top: 1px solid rgba(0, 240, 255, 0.2);
    }

    .controls {
      display: flex;
      gap: 20px;
      margin-top: 15px;
    }

    .cy-btn {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 2px;
      color: #000;
      background: var(--c-cyan);
      border: none;
      padding: 14px 35px;
      cursor: pointer;
      position: relative;
      clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .cy-btn::after {
      content: "";
      position: absolute;
      bottom: 0;
      right: 0;
      width: 15px;
      height: 15px;
      background: #fff;
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
    }

    .cy-btn:hover {
      background: #fff;
      box-shadow:
        0 0 20px var(--c-cyan),
        inset 0 0 20px var(--c-cyan);
      transform: translateY(-2px);
    }

    .cy-btn.red {
      background: var(--c-red);
      color: #fff;
    }

    .cy-btn.red:hover {
      background: #fff;
      color: var(--c-red);
      box-shadow: 0 0 20px var(--c-red);
    }

    .cy-btn.yellow {
      background: var(--c-yellow);
      color: #000;
    }

    .cy-btn.yellow:hover {
      background: #fff;
      box-shadow: 0 0 20px var(--c-yellow);
    }

    .cy-btn:disabled {
      background: #222;
      color: #555;
      cursor: not-allowed;
      box-shadow: none;
      border: 1px solid #333;
    }

    .cy-btn:disabled::after {
      background: #333;
    }

    .btn-sm {
      background: transparent;
      border: 1px solid var(--c-cyan);
      color: var(--c-cyan);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 10px;
      cursor: pointer;
      clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
      transition: all 0.2s;
    }

    .btn-sm:hover {
      background: var(--c-cyan);
      color: #000;
      box-shadow: 0 0 10px var(--c-cyan);
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--c-cyan);
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .app-main-grid {
        grid-template-columns: 320px 1fr;
        gap: 15px;
      }
    }

    @media (max-width: 860px) {
      body {
        overflow-y: auto;
      }

      .app-container {
        height: auto;
        min-height: 100vh;
        grid-template-rows: auto auto auto;
        display: flex;
        flex-direction: column;
      }

      .app-main-grid {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .cy-panel {
        max-height: 50vh;
      }
    }
  </style>
</head>

<body>
  <div class="app-container">
    <!-- HEADER -->
    <header class="app-header">
      <h1>DEER杯 AI 狼人杀</h1>
      <div class="subtitle" id="subtitle">INITIATING PROTOCOL // AI.DEATHMATCH</div>
    </header>

    <!-- MAIN GRID -->
    <main class="app-main-grid">
      <!-- LEFT: PLAYERS -->
      <section class="cy-panel">
        <div class="panel-header">
          <span>// TARGETS</span>
          <button class="btn-sm" id="toggleBtn" style="display:none" onclick="toggleRoles()">隐藏身份</button>
        </div>
        <div id="playerCards" class="players-list"></div>
      </section>

      <!-- RIGHT: CHAT STREAM -->
      <section class="cy-panel chat-container">
        <div class="panel-header">
          <span>// NEURAL_LINK_CHANNEL</span>
          <span style="font-family: 'Share Tech Mono', monospace; font-size: 11px; opacity: 0.6;">REAL-TIME_STREAM</span>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="chat-bubble system">
            <div class="bubble-system">AWAITING SYSTEM START...<br><span style="font-size:10px;opacity:0.7">API KEY REQUIRED IN APP.PY</span></div>
          </div>
        </div>
      </section>
    </main>

    <!-- BOTTOM: CONTROLS -->
    <footer class="app-controls">
      <div class="controls">
        <div style="display:flex; align-items:center; border:1px solid var(--c-cyan); padding:0 10px; height:45px; background:rgba(0,240,255,0.1);">
          <input type="checkbox" id="joinAsHuman" onchange="render()" style="margin-right:8px; width:16px; height:16px; accent-color:var(--c-cyan); cursor:pointer;">
          <label for="joinAsHuman" style="font-family:'Orbitron'; font-size:13px; color:var(--c-cyan); cursor:pointer; font-weight:bold; letter-spacing:1px; white-space:nowrap;">真人加入 (替代Qwen)</label>
        </div>
        <button class="cy-btn" id="introBtn" onclick="runIntro()">赛前介绍</button>
        <button class="cy-btn yellow" id="actionBtn" onclick="handleAction()">开始执行</button>
        <button class="cy-btn red" id="endBtn" onclick="endGame()" style="display:none">强制终止</button>
        <button class="cy-btn" id="ttsBtn" onclick="toggleTTS()" style="background: var(--c-cyan);">语音: 开</button>
      </div>
    </footer>
  </div>

  <!-- HUMAN MODAL -->
  <div id="humanModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; backdrop-filter:blur(5px);">
    <div class="cy-panel" style="padding: 20px 30px; width: 450px; max-width: 90%;">
      <div class="panel-header" style="margin: -20px -30px 20px -30px; padding: 15px 30px;">
        <span id="hmTitle" style="color:var(--c-cyan);">// HUMAN_INPUT_REQUIRED</span>
      </div>
      <p id="hmDesc" style="margin-bottom: 20px; font-family:'Rajdhani', sans-serif; font-size:16px; white-space:pre-wrap; max-height: 200px; overflow-y: auto;"></p>
      <div id="hmContent" style="margin-bottom: 20px; display:flex; flex-wrap:wrap; gap:10px;"></div>
      <div style="display:flex; justify-content:flex-end;">
        <button id="hmBtnOk" class="cy-btn">确认行动</button>
      </div>
    </div>
  </div>

  <script>
    // ===== 配置数据 =====
    const PLAYERS_CFG = [
      { id: 1, name: "Doubao", emoji: "", icon: "/static/icons/doubao.jpeg", color: "#00f0ff", personality: "说话温和体贴，容易妥协，爱说'大家说的都有道理'" },
      { id: 2, name: "DeepSeek", emoji: "", icon: "/static/icons/deepseek.jpeg", color: "#3b82f6", personality: "逻辑严密冷静，喜欢用'首先其次最后'来分析" },
      { id: 3, name: "ChatGPT", emoji: "", icon: "/static/icons/chatgpt.jpeg", color: "#10a37f", personality: "自信话多，爱用排比句，滔滔不绝" },
      { id: 4, name: "Claude", emoji: "", icon: "/static/icons/claude.jpeg", color: "#fcee0a", personality: "谨慎理性，说话礼貌克制，爱说'从多个角度来看'" },
      { id: 5, name: "Gemini", emoji: "", icon: "/static/icons/gemini.jpeg", color: "#d946ef", personality: "直觉型，大胆推测，爱说'我有种强烈的感觉'" },
      { id: 6, name: "Grok", emoji: "", icon: "/static/icons/grok.jpeg", color: "#f97316", personality: "幽默毒舌，阴阳怪气，喜欢怼人和玩梗" },
      { id: 7, name: "Qwen", emoji: "", icon: "/static/icons/qwen.jpeg", color: "#8b5cf6", personality: "老实本分，喜欢引经据典，说话带点文言文或成语" },
      { id: 8, name: "MiMo", emoji: "", icon: "/static/icons/mimo.jpeg", color: "#ec4899", personality: "活泼可爱，喜欢发颜文字，像个二次元少女" },
    ];
    const ROLE_POOL = ["狼人", "狼人", "预言家", "女巫", "猎人", "平民", "平民", "平民"];
    const ROLE_EMOJI = { "狼人": "", "预言家": "", "女巫": "", "猎人": "", "平民": "" };
    const ROLE_COLOR = { "狼人": "#ff003c", "预言家": "#d946ef", "女巫": "#3b82f6", "猎人": "#f59e0b", "平民": "#a0a0a0" };

    function hexToRgb(hex) {
      var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? parseInt(result[1], 16) + ", " + parseInt(result[2], 16) + ", " + parseInt(result[3], 16) : "0, 240, 255";
    }

    // ===== 真人交互逻辑 =====
    let _hmSelected = null;
    function awaitHumanAction(title, desc, type, options = []) {
      return new Promise(resolve => {
        const modal = document.getElementById('humanModal');
        document.getElementById('hmTitle').innerText = "// " + title;
        document.getElementById('hmDesc').innerText = desc;
        const content = document.getElementById('hmContent');
        content.innerHTML = '';
        _hmSelected = null;

        if (type === 'text') {
          content.innerHTML = '<textarea id="hmInput" style="width:100%; height:100px; background:rgba(0,0,0,0.5); color:#fff; border:1px solid var(--c-cyan); padding:10px; font-family:\'Rajdhani\'; outline:none;" placeholder="在此输入你的发言..."></textarea>';
        } else if (type === 'select') {
          content.innerHTML = options.map(opt => `<button class="cy-btn btn-sm hm-opt-btn" data-val="${opt.value}" style="flex:1; min-width:30%; padding: 10px 0;">${opt.label}</button>`).join('');
          const btns = content.querySelectorAll('.hm-opt-btn');
          btns.forEach(btn => {
            btn.onclick = () => {
              btns.forEach(b => { b.style.background = 'transparent'; b.style.color = 'var(--c-cyan)'; });
              btn.style.background = 'var(--c-cyan)';
              btn.style.color = '#000';
              _hmSelected = btn.getAttribute('data-val');
            };
          });
        } else if (type === 'witch') {
            let html = '';
            if (options.canSave) html += `<button class="cy-btn btn-sm hm-opt-btn" data-action="save" style="width:100%; padding: 10px 0;">解药：救 ${options.killTargetName}</button>`;
            if (options.canPoison) {
                html += `<div style="width:100%; margin-top:10px;">毒药目标：<select id="hmPoisonTarget" style="background:#111; color:#fff; border:1px solid var(--c-cyan); padding:5px;"><option value="">不使用毒药</option>`;
                options.alive.forEach(p => html += `<option value="${p.id}">${p.id}号 ${p.name}</option>`);
                html += `</select></div>`;
            }
            if (!options.canSave && !options.canPoison) html += `<span>无药可用</span>`;
            content.innerHTML = html;
            
            const btns = content.querySelectorAll('.hm-opt-btn');
            btns.forEach(btn => {
              btn.onclick = () => {
                if (btn.style.background === 'var(--c-cyan)') {
                    btn.style.background = 'transparent'; btn.style.color = 'var(--c-cyan)';
                    _hmSelected = null;
                } else {
                    btn.style.background = 'var(--c-cyan)'; btn.style.color = '#000';
                    _hmSelected = 'save';
                }
              };
            });
        }

        modal.style.display = 'flex';
        document.getElementById('hmBtnOk').onclick = () => {
          let result = null;
          if (type === 'text') {
            result = document.getElementById('hmInput').value.trim();
            if (!result) return;
          } else if (type === 'select') {
            result = _hmSelected;
          } else if (type === 'witch') {
             result = { save: _hmSelected === 'save', poison: document.getElementById('hmPoisonTarget') ? document.getElementById('hmPoisonTarget').value : null };
          }
          modal.style.display = 'none';
          resolve(result);
        };
      });
    }

    // ===== 游戏状态 =====
    let G = {
      players: [], phase: "setup", day: 0, logs: [],
      loading: false, winner: null, showRoles: true,
      witchItems: { save: true, poison: true },
      seerHistory: [], gameHistory: [], speakingId: null,
      ttsEnabled: true,
    };

    let audioQueuePromise = Promise.resolve();
    const retryStore = {};

    // ===== 音效管理 =====
    const AudioMgr = {
      bgm: new Audio(),
      playBgm: function (url) {
        this.bgm.src = url; this.bgm.loop = true; this.bgm.volume = 0.25;
        this.bgm.play().catch(e => console.log('BGM Error:', e));
      },
      stopBgm: function () { this.bgm.pause(); },
      playEffect: function (url) {
        const sfx = new Audio(url); sfx.volume = 0.7;
        sfx.play().catch(e => console.log('SFX Error:', e));
      }
    };

    // ===== 工具函数 =====
    function shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[b[i], b[j]] = [b[j], b[i]]; } return b; }
    function parseJSON(text) {
      try {
        const c = text.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim();
        const m = c.match(/\{[\s\S]*?\}/);
        if (m) return JSON.parse(m[0]);
      } catch { } return null;
    }
    function cleanUIText(value = "") {
      return String(value).replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\uFE0F]/gu, "").replace(/[ \t]{2,}/g, " ").replace(/^\s+/gm, "").trim();
    }
    function checkWin(ps) {
      const alive = ps.filter(p => p.alive);
      const w = alive.filter(p => p.role === "狼人").length;
      const g = alive.filter(p => p.role !== "狼人").length;
      if (w === 0) return "good";
      if (w >= g) return "wolf";
      return null;
    }
    function alive() { return G.players.filter(p => p.alive); }
    function byId(id) { return G.players.find(p => p.id === id); }
    function byRole(r) { return G.players.filter(p => p.role === r && p.alive); }

    // ===== API 调用 =====
    async function callPlayer(playerName, systemPrompt, userPrompt) {
      const resp = await fetch("/api/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ player: playerName, system: systemPrompt, message: userPrompt }),
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      return data.content;
    }

    async function playTTS(playerName, text, uiCallback) {
      if (!text) {
        if (uiCallback) {
          const last = audioQueuePromise;
          audioQueuePromise = (async () => { await last; uiCallback(); })();
        } return;
      }

      // 如果 TTS 被禁用，只执行 UI 回调，不播放音频
      if (!G.ttsEnabled) {
        if (uiCallback) {
          const last = audioQueuePromise;
          audioQueuePromise = (async () => { await last; uiCallback(); })();
        }
        return;
      }

      try {
        const resp = await fetch("/api/tts", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ player: playerName, text: text })
        });
        if (!resp.ok) throw new Error("TTS Failed");
        const blob = await resp.blob();
        const lastAudio = audioQueuePromise;
        audioQueuePromise = (async () => {
          await lastAudio;
          if (uiCallback) uiCallback();
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          await new Promise(resolve => {
            audio.onended = resolve; audio.onerror = resolve; audio.play().catch(resolve);
          });
          URL.revokeObjectURL(url);
        })();
      } catch (e) {
        if (uiCallback) {
          const last = audioQueuePromise;
          audioQueuePromise = (async () => { await last; uiCallback(); })();
        }
      }
    }

    function playHostTTS(text, uiCallback) {
      if (!text) {
        if (uiCallback) {
          const last = audioQueuePromise;
          audioQueuePromise = (async () => { await last; uiCallback(); })();
        } return;
      }

      // 如果 TTS 被禁用，只执行 UI 回调，不播放音频
      if (!G.ttsEnabled) {
        if (uiCallback) {
          const last = audioQueuePromise;
          audioQueuePromise = (async () => { await last; uiCallback(); })();
        }
        return;
      }

      const lastAudio = audioQueuePromise;
      audioQueuePromise = (async () => {
        await lastAudio;
        if (uiCallback) uiCallback();
        await new Promise(resolve => {
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(text);
          u.lang = 'zh-CN'; u.rate = 1.1; u.pitch = 0.8;
          u.onend = resolve; u.onerror = resolve;
          window.speechSynthesis.speak(u);
        });
      })();
    }

    // ===== 渲染逻辑 =====
    function addLog(content, type = "system", playerData = null) {
      G.logs.push({ content, type, playerData });
      renderChat();
    }

    function render() {
      renderCards(); renderChat(); renderSubtitle(); renderButton();
      const tb = document.getElementById("toggleBtn");
      tb.style.display = G.players.length > 0 ? "" : "none";
      tb.textContent = G.showRoles ? "隐藏身份" : "显示身份";
    }

    function renderCards() {
      const box = document.getElementById("playerCards");
      let list;
      if (G.players.length > 0) {
          list = G.players;
      } else {
          list = JSON.parse(JSON.stringify(PLAYERS_CFG)).map(p => ({ ...p, role: "?", alive: true }));
          if (document.getElementById("joinAsHuman")?.checked) {
              const qIdx = list.findIndex(p => p.name === "Qwen");
              if (qIdx >= 0) {
                  list[qIdx].name = "You(真人)"; list[qIdx].isHuman = true; list[qIdx].color = "#00ff00"; list[qIdx].icon = "/static/icons/qwen.jpeg";
              }
          }
      }

      box.innerHTML = list.map((p, i) => {
        const sr = G.showRoles && p.role && p.role !== "?";
        const speaking = G.speakingId === p.id ? "speaking" : "";
        const iconSrc = p.icon || PLAYERS_CFG.find(c => c.id === p.id)?.icon || "";
        const pRgb = hexToRgb(p.color);
        const rColor = sr ? ROLE_COLOR[p.role] : "#ffffff";
        const rRgb = hexToRgb(rColor);

        return `<div class="pcard ${p.alive ? '' : 'dead'} ${speaking}" style="--p-color:${p.color}; --p-color-rgb:${pRgb};">
          <div class="seat-num">${p.id}</div>
          <div class="mic-wave"><span></span><span></span><span></span></div>
          <div class="avatar-hex"><img src="${iconSrc}" alt="${p.name}"></div>
          <div class="pcard-info">
            <div class="name" style="color:${p.alive ? '#fff' : '#666'}">${p.name}</div>
            ${sr ? `<div class="role" style="--role-color:${rColor}; --role-color-rgb:${rRgb}">${p.role}</div>` : ''}
          </div>
          ${!p.alive ? '<div class="skull-badge">KIA</div>' : ''}
        </div>`;
      }).join("");
    }

    function renderChat() {
      const box = document.getElementById("chatMessages");
      if (G.logs.length === 0) {
        box.innerHTML = '<div class="chat-bubble system"><div class="bubble-system">AWAITING SYSTEM START...<br><span style="font-size:10px;opacity:0.7">API KEY REQUIRED IN APP.PY</span></div></div>';
        return;
      }

      box.innerHTML = G.logs.map(l => {
        const content = cleanUIText(l.content);

        // 阶段标题
        if (l.type === 'phase') {
          return `<div class="chat-bubble phase"><div class="bubble-phase">${content}</div></div>`;
        }

        // 胜利消息
        if (l.type === 'win') {
          return `<div class="chat-bubble phase"><div class="bubble-win">${content}</div></div>`;
        }

        // 死亡消息
        if (l.type === 'death') {
          return `<div class="chat-bubble phase"><div class="bubble-death">☠ ${content}</div></div>`;
        }

        // 玩家发言
        if (l.type === 'speech') {
          const p = l.playerData || PLAYERS_CFG.find(c => content.startsWith(`${c.name}`));
          if (p) {
            const nameEnd = content.indexOf('：') || content.indexOf(':');
            const text = nameEnd > 0 ? content.substring(nameEnd + 1) : content;
            const pRgb = hexToRgb(p.color);
            const sr = G.showRoles && p.role && p.role !== "?";
            const rColor = sr ? ROLE_COLOR[p.role] : "#fff";
            const rRgb = hexToRgb(rColor);

            return `<div class="chat-bubble" style="--player-color:${p.color}; --player-color-rgb:${pRgb};">
              <div class="bubble-avatar"><img src="${p.icon}" alt="${p.name}"></div>
              <div class="bubble-content">
                <div class="bubble-header">
                  <div class="bubble-name">${p.name}</div>
                  ${sr ? `<div class="bubble-role" style="--role-color:${rColor}; --role-color-rgb:${rRgb}">${p.role}</div>` : ''}
                </div>
                <div class="bubble-text">${text}</div>
              </div>
            </div>`;
          }
        }

        // 失败的发言
        if (l.type === 'speech-failed') {
          const p = l.playerData || PLAYERS_CFG.find(c => content.startsWith(`${c.name}`));
          if (p) {
            const pRgb = hexToRgb(p.color);
            return `<div class="chat-bubble" style="--player-color:${p.color}; --player-color-rgb:${pRgb};">
              <div class="bubble-avatar"><img src="${p.icon}" alt="${p.name}"></div>
              <div class="bubble-content">
                <div class="bubble-header">
                  <div class="bubble-name">${p.name}</div>
                </div>
                <div class="bubble-text" style="border-left-color: var(--c-red);">
                  CONNECTION_LOST
                  <button class="btn-retry" onclick="retrySpeech('${l.retryId}')">RETRY</button>
                </div>
              </div>
            </div>`;
          }
        }

        // 系统消息
        return `<div class="chat-bubble system"><div class="bubble-system">${content}</div></div>`;
      }).join("");

      box.scrollTop = box.scrollHeight;
    }

    function renderSubtitle() {
      const el = document.getElementById("subtitle");
      if (G.phase === "setup") { el.textContent = "INITIATING PROTOCOL // AI.DEATHMATCH"; return; }
      const m = { "night": "NIGHT_PHASE", "speeches": "DAY_SPEECH", "vote": "VOTING_PHASE", "game_over": G.winner === "wolf" ? "WOLF_WIN" : "HUMAN_WIN" };
      el.textContent = `DAY_${G.day} // ${m[G.phase] || ""}`;
    }

    function renderButton() {
      const btn = document.getElementById("actionBtn");
      const endBtn = document.getElementById("endBtn");
      const introBtn = document.getElementById("introBtn");
      const ttsBtn = document.getElementById("ttsBtn");

      const labels = { "setup": "开始执行", "night": "进入黑夜", "speeches": "开始发言", "vote": "开始投票", "game_over": "系统重启" };
      btn.textContent = G.loading ? "PROCESSING..." : labels[G.phase];
      btn.disabled = G.loading;

      const inGame = G.phase !== "setup" && G.phase !== "game_over";
      endBtn.style.display = inGame ? "" : "none";
      endBtn.disabled = G.loading;
      introBtn.disabled = G.loading;

      // 更新 TTS 按钮状态
      if (ttsBtn) {
        ttsBtn.textContent = G.ttsEnabled ? "语音: 开" : "语音: 关";
        ttsBtn.style.background = G.ttsEnabled ? "var(--c-cyan)" : "#444";
        ttsBtn.style.color = G.ttsEnabled ? "#000" : "#888";
      }
    }

    async function runIntro() {
      if (G.loading) return;
      G.loading = true; G.logs = []; G.speakingId = null; render();
      addLog("SYS.INTRO_SEQUENCE", "phase");

      const isHumanJoin = document.getElementById("joinAsHuman")?.checked;
      let targetCfgs = JSON.parse(JSON.stringify(PLAYERS_CFG));
      if (isHumanJoin) {
         const qwenIdx = targetCfgs.findIndex(p => p.name === "Qwen");
         if (qwenIdx >= 0) {
            targetCfgs[qwenIdx].name = "You(真人)";
            targetCfgs[qwenIdx].isHuman = true;
            targetCfgs[qwenIdx].color = "#00ff00";
            targetCfgs[qwenIdx].personality = "这是你自己";
         }
      }

      for (const p of targetCfgs) {
        if (p.isHuman) {
          audioQueuePromise = audioQueuePromise.then(() => { setSpeaking(p.id, "INPUTTING..."); });
          const intro = await awaitHumanAction("SYS.INTRO", "请向大家做一句话自我介绍：", "text");
          G.logs.push({ content: `${p.name}：${intro}`, type: "speech", playerData: p });
          renderChat();
          audioQueuePromise = audioQueuePromise.then(() => { setSpeaking(null); });
          continue;
        }

        const sys = `你是 ${p.name}，一个 AI 语言模型。现在需要用中文向大家自我介绍：第一句话说明你是哪家公司的什么模型，第二句话说你的狼人杀游戏挑衅其他5个AI模型的宣言。不要超过30个字。语言风格要符合你的性格特点：${p.personality}。不超过2句话，简洁有力。`;
        const msg = `请用你自己的风格介绍一下你自己。`;

        try {
          const resp = await callPlayer(p.name, sys, msg);
          const intro = resp.replace(/^["'`\s]+|["'`\s]+$/g, "").trim();
          await playTTS(p.name, intro, () => {
            setSpeaking(p.id, intro);
            G.logs.push({ content: `${p.name}：${intro}`, type: "speech", playerData: p });
            renderChat();
          });
        } catch (e) {
          const _rid = `retry_${Date.now()}_intro_${p.id}`;
          retryStore[_rid] = { player: p, systemPrompt: sys, userPrompt: msg };
          await playTTS(p.name, "", () => {
            G.logs.push({ content: `${p.name}：[CONNECTION_LOST]`, type: "speech-failed", retryId: _rid, playerData: p });
            renderChat();
          });
        }
        audioQueuePromise = audioQueuePromise.then(() => { setSpeaking(null); });
      }

      await audioQueuePromise;
      G.loading = false; render();
    }

    function endGame() {
      if (G.loading || G.phase === "setup" || G.phase === "game_over") return;
      G.loading = false; G.winner = null; G.phase = "game_over";
      addLog("SYSTEM_TERMINATED_BY_USER", "win");
      render();
    }

    function toggleRoles() { G.showRoles = !G.showRoles; render(); }

    function toggleTTS() {
      G.ttsEnabled = !G.ttsEnabled;
      render();
    }

    function setSpeaking(id, text = "") {
      G.speakingId = id;
      renderCards();
    }

    async function retrySpeech(retryId) {
      const data = retryStore[retryId]; if (!data) return;
      const { player, systemPrompt, userPrompt } = data; delete retryStore[retryId];
      const logIdx = G.logs.findIndex(l => l.retryId === retryId);
      if (logIdx >= 0) { G.logs[logIdx] = { content: `  [RECONNECTING] ${player.name}...`, type: "system" }; renderChat(); }

      try {
        const resp = await callPlayer(player.name, systemPrompt, userPrompt);
        const speech = resp.replace(/^["'`\s]+|["'`\s]+$/g, "").trim();
        await playTTS(player.name, speech, () => {
          setSpeaking(player.id, speech);
          if (logIdx >= 0) G.logs[logIdx] = { content: `${player.name}：${speech}`, type: "speech", playerData: player };
          renderChat();
        });
        audioQueuePromise = audioQueuePromise.then(() => { setSpeaking(null); });
      } catch (e) {
        const newId = `retry_${Date.now()}_${player.id}`;
        retryStore[newId] = { player, systemPrompt, userPrompt };
        if (logIdx >= 0) {
          G.logs[logIdx] = { content: `${player.name}：[RECONNECT_FAILED]`, type: "speech-failed", retryId: newId, playerData: player };
          renderChat();
        }
      }
    }

    function makeSystemPrompt(player) {
      const roleInfo = player.role === "狼人"
        ? `你的身份是【狼人】。队友：${byRole("狼人").filter(p => p.id !== player.id).map(p => p.id + "号" + p.name).join("、") || "无"}。你必须伪装好人。`
        : player.role === "预言家"
          ? `你的身份是【预言家】。查验记录：${G.seerHistory.map(h => `${h.target}号是${h.result}`).join("；") || "暂无"}。`
          : player.role === "女巫"
            ? `你的身份是【女巫】。${G.witchItems.save ? "有解药" : "无解药"}，${G.witchItems.poison ? "有毒药" : "无毒药"}。`
            : `你的身份是【${player.role}】。`;

      return `你是 ${player.name}，正在玩8人狼人杀游戏。
特点：${player.personality}
${roleInfo}
存活：${alive().map(p => p.id + "号" + p.name).join("、")}
历史事件：${G.gameHistory.join("\n") || "无"}
要求：只能基于已知信息判断，回复简短（2-3句话），必须严格按要求格式回复。`;
    }

    function startGame() {
      const roles = shuffle(ROLE_POOL);
      const isHumanJoin = document.getElementById("joinAsHuman")?.checked;
      let finalPlayersCfg = JSON.parse(JSON.stringify(PLAYERS_CFG));
      if (isHumanJoin) {
         const qwenIdx = finalPlayersCfg.findIndex(p => p.name === "Qwen");
         if (qwenIdx >= 0) {
            finalPlayersCfg[qwenIdx].name = "You(真人)";
            finalPlayersCfg[qwenIdx].isHuman = true;
            finalPlayersCfg[qwenIdx].color = "#00ff00";
            finalPlayersCfg[qwenIdx].personality = "这是你自己";
         }
      }
      G = {
        players: finalPlayersCfg.map((p, i) => ({ ...p, role: roles[i], alive: true })),
        phase: "night", day: 1, logs: [], loading: false, winner: null, showRoles: true,
        witchItems: { save: true, poison: true }, seerHistory: [], gameHistory: [], speakingId: null
      };
      addLog("SYS.ROLE_ASSIGNED", "phase");
      G.players.forEach(p => addLog(`  [SYS] ${p.name} → ${p.role}`, "role"));

      AudioMgr.playEffect('/static/audio/start.mp3');
      playHostTTS('角色分配完毕，即将进入黑夜', () => { });
      render();
    }

    async function runNight() {
      G.loading = true; render();
      audioQueuePromise = audioQueuePromise.then(() => { addLog(`DAY_${G.day} // NIGHT_PHASE`, "phase"); });
      audioQueuePromise = audioQueuePromise.then(() => { AudioMgr.playBgm('/static/audio/bg_night.mp3'); });
      playHostTTS('天黑请闭眼。', () => { });

      const wolves = byRole("狼人"), seer = byRole("预言家")[0], witch = byRole("女巫")[0], nonWolves = alive().filter(p => p.role !== "狼人");

      let wolfTarget = null;
      if (wolves.length > 0) {
        playHostTTS('狼人请睁眼，请确认击杀目标。', () => { addLog(`WOLF_ACTION...`, "system"); });
        for (const wolf of wolves) {
          audioQueuePromise = audioQueuePromise.then(() => { setSpeaking(wolf.id, "TARGETING..."); });
          
          if (wolf.isHuman) {
            const opts = nonWolves.map(x => ({label: x.id+"号 "+x.name, value: x.id}));
            const res = await awaitHumanAction("狼人行动", "请选择击杀目标：", "select", opts);
            if (res) {
               wolfTarget = parseInt(res);
               audioQueuePromise = audioQueuePromise.then(() => { addLog(`  ${wolf.name} 锁定 → ${byId(wolfTarget)?.name}`, "system"); });
            }
          } else {
            const candidates = nonWolves.map(p => p.id + "号" + p.name).join("、");
            let prompt = `现在是第${G.day}天夜晚，你要选择杀谁。\n可选：${candidates}\n`;
            if (wolves.length > 1 && wolfTarget) prompt += `队友建议杀 ${byId(wolfTarget)?.name}，同意吗？\n`;
            prompt += `返回JSON：{"target":目标id数字,"reason":"一句话理由"}`;

            try {
              const resp = await callPlayer(wolf.name, makeSystemPrompt(wolf), prompt);
              const r = parseJSON(resp);
              if (r?.target) {
                wolfTarget = r.target;
                audioQueuePromise = audioQueuePromise.then(() => { addLog(`  ${wolf.name} 锁定 → ${byId(r.target)?.name}`, "system"); });
              }
            } catch (e) {
              audioQueuePromise = audioQueuePromise.then(() => { addLog(`  ${wolf.name} [ERROR]`, "system"); });
              if (!wolfTarget) wolfTarget = nonWolves[Math.floor(Math.random() * nonWolves.length)].id;
            }
          }
          audioQueuePromise = audioQueuePromise.then(() => { setSpeaking(null); });
        }
        if (!wolfTarget) wolfTarget = nonWolves[Math.floor(Math.random() * nonWolves.length)].id;
        audioQueuePromise = audioQueuePromise.then(() => { addLog(`  TARGET_CONFIRMED → ${byId(wolfTarget)?.name}`, "system"); });
      } else {
        playHostTTS('狼人请睁眼，请确认击杀目标。', () => { });
        audioQueuePromise = audioQueuePromise.then(() => new Promise(r => setTimeout(r, 1500)));
      }
      playHostTTS('狼人请闭眼。', () => { });

      if (seer) {
        playHostTTS('预言家请睁眼，请选择要查验的玩家。', () => { setSpeaking(seer.id, "SCANNING..."); addLog(`SEER_ACTION...`, "system"); });
        const canCheck = alive().filter(p => p.id !== seer.id && !G.seerHistory.find(h => h.target === p.id));
        if (seer.isHuman) {
            const opts = canCheck.map(x => ({label: x.id+"号 "+x.name, value: x.id}));
            const res = await awaitHumanAction("预言家行动", "请选择查验目标：", "select", opts);
            if (res) {
                const targetId = parseInt(res);
                const tp = byId(targetId), result = tp?.role === "狼人" ? "狼人" : "好人";
                G.seerHistory.push({ target: targetId, result });
                audioQueuePromise = audioQueuePromise.then(() => { addLog(`  ${seer.name} 扫描 ${tp?.name} → ${result}`, "system"); });
            }
        } else {
            const prompt = `你要查验一个人的身份。\n可查验：${canCheck.map(p => p.id + "号" + p.name).join("、")}\n返回JSON：{"target":目标id数字,"reason":"一句话理由"}`;
            try {
              const resp = await callPlayer(seer.name, makeSystemPrompt(seer), prompt);
              const r = parseJSON(resp);
              if (r?.target) {
                const tp = byId(r.target), result = tp?.role === "狼人" ? "狼人" : "好人";
                G.seerHistory.push({ target: r.target, result });
                audioQueuePromise = audioQueuePromise.then(() => { addLog(`  ${seer.name} 扫描 ${tp?.name} → ${result}`, "system"); });
              }
            } catch (e) { audioQueuePromise = audioQueuePromise.then(() => { addLog(`  ${seer.name} [ERROR]`, "system"); }); }
        }
        audioQueuePromise = audioQueuePromise.then(() => { setSpeaking(null); });
      } else {
        playHostTTS('预言家请睁眼，请选择要查验的玩家。', () => { });
        audioQueuePromise = audioQueuePromise.then(() => new Promise(r => setTimeout(r, 1500)));
      }
      playHostTTS('预言家请闭眼。', () => { });

      let saved = false, poisoned = null;
      if (witch && (G.witchItems.save || G.witchItems.poison)) {
        playHostTTS('女巫请睁眼，你要使用解药吗？你要使用毒药吗？', () => { setSpeaking(witch.id, "CHEM_ANALYSIS..."); addLog(`WITCH_ACTION...`, "system"); });
        if (witch.isHuman) {
            const opts = {
                canSave: G.witchItems.save, 
                canPoison: G.witchItems.poison, 
                killTargetName: byId(wolfTarget)?.name || "无",
                alive: alive().filter(p => p.id !== witch.id)
            };
            const res = await awaitHumanAction("女巫行动", `今晚 ${opts.killTargetName} 被袭击。你要使用解药或毒药吗？`, "witch", opts);
            if (res) {
                if (res.save && G.witchItems.save) { saved = true; G.witchItems.save = false; audioQueuePromise = audioQueuePromise.then(() => { addLog(`  ${witch.name} HEALED ${byId(wolfTarget)?.name}`, "system"); }); }
                if (res.poison && G.witchItems.poison) {
                    const pp = byId(parseInt(res.poison));
                    if (pp && pp.alive) { poisoned = parseInt(res.poison); G.witchItems.poison = false; audioQueuePromise = audioQueuePromise.then(() => { addLog(`  ${witch.name} POISONED ${pp.name}`, "system"); }); }
                }
            }
        } else {
            const prompt = `今晚 ${byId(wolfTarget)?.name} 被杀。
${G.witchItems.save ? "你有解药" : "无解药"}，${G.witchItems.poison ? "有毒药，可选：" + alive().filter(p => p.id !== witch.id).map(p => p.id + "号").join("、") : "无毒药"}
返回JSON：{"save":true/false,"poison":目标id或null,"reason":"理由"}`;
            try {
              const resp = await callPlayer(witch.name, makeSystemPrompt(witch), prompt);
              const r = parseJSON(resp);
              if (r) {
                if (r.save && G.witchItems.save) { saved = true; G.witchItems.save = false; audioQueuePromise = audioQueuePromise.then(() => { addLog(`  ${witch.name} HEALED ${byId(wolfTarget)?.name}`, "system"); }); }
                if (r.poison && G.witchItems.poison) {
                  const pp = byId(r.poison);
                  if (pp && pp.alive) { poisoned = r.poison; G.witchItems.poison = false; audioQueuePromise = audioQueuePromise.then(() => { addLog(`  ${witch.name} POISONED ${pp.name}`, "system"); }); }
                }
              }
            } catch (e) { audioQueuePromise = audioQueuePromise.then(() => { addLog(`  ${witch.name} [ERROR]`, "system"); }); }
        }
        audioQueuePromise = audioQueuePromise.then(() => { setSpeaking(null); });
      } else {
        playHostTTS('女巫请睁眼，你要使用解药吗？你要使用毒药吗？', () => { });
        audioQueuePromise = audioQueuePromise.then(() => new Promise(r => setTimeout(r, 1500)));
      }
      playHostTTS('女巫请闭眼。', () => { });

      audioQueuePromise = audioQueuePromise.then(() => { addLog(`DAY_${G.day} // SUNRISE`, "phase"); });
      audioQueuePromise = audioQueuePromise.then(() => { AudioMgr.playBgm('/static/audio/bg_day.mp3'); });
      playHostTTS('天亮了，大家请睁眼。', () => { });

      let deaths = [];
      if (!saved && wolfTarget) deaths.push(wolfTarget);
      if (poisoned) deaths.push(poisoned);

      if (deaths.length === 0) {
        playHostTTS('昨夜是个平安夜，无人出局。', () => { addLog("NO_CASUALTIES", "system"); });
        G.gameHistory.push(`第${G.day}夜：平安夜`);
      } else {
        const deadNames = deaths.map(id => byId(id)?.name).join('和');
        playHostTTS(`昨晚，${deadNames} 惨遭淘汰。`, () => {
          deaths.forEach(id => {
            const p = byId(id); if (p) { p.alive = false; addLog(`${p.name} (${p.role}) WAS_TERMINATED`, "death"); }
          });
        });
        G.gameHistory.push(`第${G.day}夜：${deaths.map(id => byId(id)?.name).join("、")}出局`);
      }

      const w = checkWin(G.players);
      if (w) {
        audioQueuePromise = audioQueuePromise.then(() => { AudioMgr.stopBgm(); AudioMgr.playEffect(w === "wolf" ? '/static/audio/lose.mp3' : '/static/audio/win.mp3'); });
        playHostTTS(w === "wolf" ? '游戏结束，狼人获胜' : '游戏结束，好人获胜', () => { });
        G.winner = w; G.phase = "game_over";
        audioQueuePromise = audioQueuePromise.then(() => { addLog(w === "wolf" ? "WOLVES_WIN" : "HUMANS_WIN", "win"); });
      } else { G.phase = "speeches"; }

      await audioQueuePromise;
      G.loading = false; render();
    }

    async function runSpeeches() {
      G.loading = true; render();
      addLog(`DAY_SPEECH // FREE_TALK`, "phase");
      const aliveP = alive(); let prevSpeeches = [];

      for (const p of aliveP) {
        addLog(`  [AWAITING_INPUT] ${p.name}...`, "system");
        const prevText = prevSpeeches.length > 0 ? "前面发言：\n" + prevSpeeches.map(s => `${s.name}：${s.content}`).join("\n") : "你是第一个发言的。";
        
        if (p.isHuman) {
          audioQueuePromise = audioQueuePromise.then(() => { setSpeaking(p.id, "INPUTTING..."); });
          const speech = await awaitHumanAction("白天发言", `轮到你了。\n\n${prevText}`, "text");
          prevSpeeches.push({ name: p.name, content: speech });
          G.logs[G.logs.length - 1] = { content: `${p.name}：${speech}`, type: "speech", playerData: p };
          renderChat();
          audioQueuePromise = audioQueuePromise.then(() => { setSpeaking(null); });
          continue;
        }

        const prompt = `第${G.day}天白天发言。${prevText}\n请发表看法（2-3句话）。直接说话，不要JSON或引号。`;

        try {
          const resp = await callPlayer(p.name, makeSystemPrompt(p), prompt);
          const speech = resp.replace(/^["'`\s]+|["'`\s]+$/g, "").trim();
          prevSpeeches.push({ name: p.name, content: speech });
          await playTTS(p.name, speech, () => {
            setSpeaking(p.id, speech);
            G.logs[G.logs.length - 1] = { content: `${p.name}：${speech}`, type: "speech", playerData: p };
            renderChat();
          });
        } catch (e) {
          const _rid = `retry_${Date.now()}_speech_${p.id}`;
          retryStore[_rid] = { player: p, systemPrompt: makeSystemPrompt(p), userPrompt: prompt };
          await playTTS(p.name, "", () => {
            G.logs[G.logs.length - 1] = { content: `${p.name}：[CONNECTION_LOST]`, type: "speech-failed", retryId: _rid, playerData: p };
            renderChat();
          });
        }
        audioQueuePromise = audioQueuePromise.then(() => { setSpeaking(null); });
      }

      await audioQueuePromise;
      G.phase = "vote"; G.loading = false; render();
    }

    async function runVote() {
      G.loading = true; render();
      addLog(`VOTING_PHASE`, "phase");
      const aliveP = alive();
      const recentSpeeches = G.logs.filter(l => l.type === "speech").slice(-aliveP.length);
      const speechText = recentSpeeches.map(l => l.content).join("\n");
      const voteCount = {};

      for (const p of aliveP) {
        setSpeaking(p.id, "ANALYZING_VOTE...");
        addLog(`  [VOTING] ${p.name}...`, "system");
        const validTargets = aliveP.filter(x => x.id !== p.id);
        
        if (p.isHuman) {
           const opts = validTargets.map(x => ({label: x.id+"号 "+x.name, value: x.id}));
           opts.push({label: "弃票", value: "0"});
           const res = await awaitHumanAction("投票阶段", "请选择你要投票淘汰的玩家：", "select", opts);
           if (res && res !== "0") {
              const targetId = parseInt(res);
              const tp = byId(targetId);
              G.logs[G.logs.length - 1] = { content: `${p.name} → VOTE_FOR → ${tp.name}`, type: "system" };
              voteCount[targetId] = (voteCount[targetId] || 0) + 1;
           } else {
              G.logs[G.logs.length - 1] = { content: `${p.name} → ABSTAIN`, type: "system" };
           }
           setSpeaking(null);
           continue;
        }

        const candidates = validTargets.map(x => x.id + "号" + x.name).join("、");
        const prompt = `投票环节。前面发言：\n${speechText}\n可投：${candidates}（不能投自己）\n返回JSON：{"target":目标id数字,"reason":"一句话理由"}`;

        let r = null, retries = 0, finalPrompt = prompt, commError = null;
        while (retries < 3) {
          try {
            const resp = await callPlayer(p.name, makeSystemPrompt(p), finalPrompt);
            const tempR = parseJSON(resp);
            if (tempR?.target) {
              const valid = aliveP.filter(x => x.id !== p.id);
              if (tempR.target === p.id || !valid.find(x => x.id === tempR.target)) {
                retries++; finalPrompt = prompt + `\n无效投票！请投存活的其他人。`; continue;
              }
              r = tempR; break;
            } else { retries++; finalPrompt = prompt + `\n格式错误，必须是 {"target":数字, "reason":"理由"}`; }
          } catch (e) { commError = e; break; }
        }

        if (r?.target) {
          const tp = byId(r.target);
          G.logs[G.logs.length - 1] = { content: `${p.name} → VOTE_FOR → ${tp.name}`, type: "system" };
          voteCount[r.target] = (voteCount[r.target] || 0) + 1;
        } else if (commError) {
          G.logs[G.logs.length - 1] = { content: `${p.name} → ABSTAIN [COMM_ERROR]`, type: "system" };
        } else {
          G.logs[G.logs.length - 1] = { content: `${p.name} → ABSTAIN [SYS_REJECT]`, type: "system" };
        }
        setSpeaking(null);
      }

      addLog(`VOTE_RESULTS`, "phase");
      const maxV = Math.max(...Object.values(voteCount), 0);
      const tops = Object.entries(voteCount).filter(([, c]) => c === maxV).map(([id]) => parseInt(id));

      alive().forEach(p => {
        const cnt = voteCount[p.id] || 0;
        if (cnt > 0) addLog(`  ${p.name}: ${cnt} VOTES ${"■".repeat(cnt)}`, "system");
      });

      if (tops.length === 1 && maxV > 0) {
        const el = byId(tops[0]);
        playHostTTS(`投票结果出炉，${el.name} 被淘汰。`, () => {
          el.alive = false; addLog(`${el.name} (${el.role}) ELIMINATED (${maxV} VOTES)`, "death");
        });
        G.gameHistory.push(`第${G.day}天投票：${el.name}淘汰`);
      } else if (tops.length > 1) {
        playHostTTS(`平票，无人淘汰！`, () => { addLog(`TIE_VOTE. NO_ELIMINATION.`, "system"); });
        G.gameHistory.push(`第${G.day}天投票：平票`);
      } else {
        playHostTTS('所有人弃票，无人出局。', () => { addLog(`ALL_ABSTAIN. NO_ELIMINATION.`, "system"); });
        G.gameHistory.push(`第${G.day}天投票：弃票`);
      }

      const w = checkWin(G.players);
      if (w) {
        AudioMgr.stopBgm(); AudioMgr.playEffect(w === "wolf" ? '/static/audio/lose.mp3' : '/static/audio/win.mp3');
        playHostTTS(w === "wolf" ? '游戏结束，狼人获胜' : '游戏结束，好人获胜', () => {
          G.winner = w; G.phase = "game_over";
          addLog(w === "wolf" ? "WOLVES_WIN" : "HUMANS_WIN", "win");
        });
      } else { G.day++; G.phase = "night"; }

      await audioQueuePromise;
      G.loading = false; render();
    }

    function handleAction() {
      if (G.loading) return;
      if (G.phase === "setup") startGame();
      else if (G.phase === "night") runNight();
      else if (G.phase === "speeches") runSpeeches();
      else if (G.phase === "vote") runVote();
      else if (G.phase === "game_over") { G.phase = "setup"; G.players = []; G.logs = []; render(); }
    }

    render();
  </script>
</body>

</html>
